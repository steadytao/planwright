version: 2

project_name: planwright

before:
  hooks:
    - go mod download
    - bash .github/scripts/release/generate_windows_resources.sh

builds:
  - id: planwright
    main: ./cmd/planwright
    binary: planwright
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
