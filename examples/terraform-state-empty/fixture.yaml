schema: planwright.fixture.v1
id: terraform-state-empty
name: Empty Terraform state inventory fixture
source_format: terraform-state-json
source_path: state.json
compatibility_level: 2
expected_loss_categories: []
commands:
  - name: review empty Terraform state
    args: ["review", "terraform-state", "${source}", "--out", "${temp}/terraform-state.md", "--loss-report", "${temp}/terraform-state-loss.md"]
    want_exit: 0
    want_files:
      - "${temp}/terraform-state.md"
      - "${temp}/terraform-state-loss.md"
    want_file_contains:
      - path: "${temp}/terraform-state.md"
        contains:
          - "No resources were found"
